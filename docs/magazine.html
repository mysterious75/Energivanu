<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energivanu | Insights Magazine</title>
    
    <!-- Google Fonts for MNTN Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f1ee;
            --text-main: #1a1615;
            --text-muted: #693f3d;
            --accent: #c9502e;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(244, 241, 238, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(26, 22, 21, 0.05);
        }
        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: var(--accent);
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin-top: 80px; /* offset for fixed navbar */
            width: 100%;
            height: calc(100vh - 80px);
        }

        .magazine-container {
            width: 100%;
            height: 100%;
            background: #2a2a2e; /* PDF viewer typical dark gray background */
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

    </style>
</head>
<body>

    <nav id="navbar">
        <a href="index.html" class="logo">Energivanu</a>
        <div class="nav-links">
            <a href="index.html">Equipment</a>
            <a href="whitepaper.html">Whitepaper</a>
            <a href="magazine.html" style="color: var(--accent);">Magazine</a>
            <a href="https://github.com/mysterious75/energivanu2">GitHub</a>
        </div>
    </nav>

    <main>
        <div class="magazine-container">
            <iframe src="magazine/Energivanu_Insights_Magazine.pdf?v=5#toolbar=0&navpanes=0&view=FitH" title="Energivanu Insights Magazine">
                <p>Your browser does not support PDFs. <a href="magazine/Energivanu_Insights_Magazine.pdf">Download the PDF</a>.</p>
            </iframe>
        </div>
    </main>

</body>
</html>
