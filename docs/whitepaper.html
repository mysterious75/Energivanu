<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energivanu | Whitepaper</title>
    
    <!-- Google Fonts for MNTN Aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Marked.js for parsing markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --accent: #FBD786;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: var(--accent);
        }

        /* --- WHITEPAPER HERO --- */
        .wp-hero {
            padding: 150px 10% 50px 10%;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .wp-hero h1 {
            font-family: var(--font-heading);
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .wp-hero p {
            color: var(--accent);
            letter-spacing: 3px;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        /* --- CONTENT --- */
        .content-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 5rem 2rem;
        }

        .markdown-body {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .markdown-body h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--text-main);
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .markdown-body h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--text-main);
            margin-top: 2.5rem;
            margin-bottom: 1rem;
        }
        .markdown-body h3 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .markdown-body p {
            margin-bottom: 1.5rem;
        }
        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }
        .markdown-body li {
            margin-bottom: 0.5rem;
        }
        .markdown-body code {
            background: rgba(255,255,255,0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            color: var(--text-main);
        }
        .markdown-body pre {
            background: #15161c;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        /* Fade in */
        .fade-in {
            animation: fadeIn 1s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animated Text Reveal */
        .reveal-word {
            opacity: 0.15;
            transform: translateY(8px);
            display: inline-block;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-right: 0.25em; /* Ensure spaces between inline-block spans */
        }
        .reveal-word.active {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <nav id="navbar">
        <a href="index.html" class="logo">Energivanu</a>
        <div class="nav-links">
            <a href="index.html">Equipment</a>
            <a href="whitepaper.html" style="color: var(--accent);">Whitepaper</a>
            <a href="magazine.html">Magazine</a>
            <a href="https://github.com/mysterious75/energivanu2">GitHub</a>
        </div>
    </nav>

    <header class="wp-hero fade-in">
        <h1>Technical Whitepaper</h1>
        <p>Documentation & Research</p>
    </header>

    <main class="content-wrapper fade-in">
        <div id="content" class="markdown-body">
            Loading documentation...
        </div>
    </main>

    <script>
        // Recursive text node splitter to wrap words in spans for reveal animation
        function revealTextNodes(element) {
            let wordIndex = 0;
            
            function helper(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.nodeValue;
                    // Split by whitespace but keep the spacing
                    const words = text.split(/(\s+)/);
                    const fragment = document.createDocumentFragment();
                    
                    words.forEach(w => {
                        if (w.trim() === '') {
                            fragment.appendChild(document.createTextNode(w));
                        } else {
                            const span = document.createElement('span');
                            span.className = 'reveal-word';
                            span.textContent = w;
                            span.style.transitionDelay = `${wordIndex * 0.015}s`;
                            fragment.appendChild(span);
                            wordIndex++;
                        }
                    });
                    node.parentNode.replaceChild(fragment, node);
                } else {
                    const children = Array.from(node.childNodes);
                    children.forEach(child => {
                        // Ignore code blocks, links, and formatted tags inside text reveal processing
                        if (child.nodeName !== 'PRE' && child.nodeName !== 'CODE') {
                            helper(child);
                        }
                    });
                }
            }
            helper(element);
        }

        document.addEventListener("DOMContentLoaded", function() {
            fetch('WHITEPAPER.md')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(text => {
                    const contentDiv = document.getElementById('content');
                    contentDiv.innerHTML = marked.parse(text);
                    
                    // Select headers, paragraphs, and list items for reveal
                    const targets = contentDiv.querySelectorAll('h1, h2, h3, p, li');
                    targets.forEach(el => {
                        revealTextNodes(el);
                    });

                    // Set up intersection observer to trigger active class when scrolled into view
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const words = entry.target.querySelectorAll('.reveal-word');
                                words.forEach(word => word.classList.add('active'));
                                observer.unobserve(entry.target);
                            }
                        });
                    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                    targets.forEach(el => observer.observe(el));
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = '<p>Error loading documentation. Please view directly on <a href="https://github.com/mysterious75/energivanu2">GitHub</a>.</p>';
                    console.error('Error fetching WHITEPAPER.md:', error);
                });
        });
    </script>
</body>
</html>
