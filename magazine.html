<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energivanu Insights | Presentation</title>
    
    <!-- Google Fonts for Modern Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #08090a;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8a8f98;
            --accent: #5e6ad2;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-body);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(8, 9, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }
        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-primary);
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: var(--text-primary);
        }

        /* --- PRESENTATION FEED --- */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            padding: 120px 5% 100px 5%;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        .slide-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            background-color: #111215;
            aspect-ratio: 2 / 1;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .slide-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Energivanu</a>
        <div class="nav-links">
            <a href="index.html">Equipment</a>
            <a href="whitepaper.html">Whitepaper</a>
            <a href="magazine.html" style="color: var(--text-primary);">Magazine</a>
            <a href="https://github.com/mysterious75/energivanu2">GitHub</a>
        </div>
    </nav>

    <main>
        <div class="slide-container"><img src="magazine/assets/slide_01.png" alt="Slide 01"></div>
        <div class="slide-container"><img src="magazine/assets/slide_02.png" alt="Slide 02"></div>
        <div class="slide-container"><img src="magazine/assets/slide_03.png" alt="Slide 03"></div>
        <div class="slide-container"><img src="magazine/assets/slide_04.png" alt="Slide 04"></div>
        <div class="slide-container"><img src="magazine/assets/slide_05.png" alt="Slide 05"></div>
        <div class="slide-container"><img src="magazine/assets/slide_06.png" alt="Slide 06"></div>
        <div class="slide-container"><img src="magazine/assets/slide_07.png" alt="Slide 07"></div>
        <div class="slide-container"><img src="magazine/assets/slide_08.png" alt="Slide 08"></div>
        <div class="slide-container"><img src="magazine/assets/slide_09.png" alt="Slide 09"></div>
        <div class="slide-container"><img src="magazine/assets/slide_10.png" alt="Slide 10"></div>
        <div class="slide-container"><img src="magazine/assets/slide_11.png" alt="Slide 11"></div>
        <div class="slide-container"><img src="magazine/assets/slide_12.png" alt="Slide 12"></div>
    </main>

    <script>
        // Intersection Observer for scroll-fade animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); // trigger animation only once
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.slide-container').forEach(el => observer.observe(el));
    </script>
</body>
</html>
