<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energivanu | Whitepaper</title>
    
    <!-- Google Fonts: Modern Sans-Serif & Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Marked.js for parsing markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #050608;
            --text-main: #f5f6f9;
            --text-muted: #a0a5b5;
            --accent: #C7A76B; /* Luxury gold matching Avenir/Dreelio */
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* --- COSMIC PARALLAX BACKGROUND --- */
        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, #0d111b 0%, #050608 100%);
        }

        /* Stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.4;
        }

        /* Planets */
        .planet {
            position: absolute;
            border-radius: 50%;
            transform: translateY(0);
            will-change: transform;
        }

        /* Planet 1: Glowing Gold/Orange Saturn */
        .planet-saturn {
            width: 180px;
            height: 180px;
            top: 15%;
            left: 8%;
            background: radial-gradient(circle at 30% 30%, #e2b07e 0%, #86552a 70%, #1e1107 100%);
            box-shadow: -10px -10px 30px rgba(0,0,0,0.8) inset, 0 0 40px rgba(226, 176, 126, 0.2);
            opacity: 0.65;
        }
        .planet-saturn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 280px;
            height: 20px;
            border: 6px solid rgba(226, 176, 126, 0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            box-shadow: 0 0 10px rgba(226, 176, 126, 0.2);
        }

        /* Planet 2: Cratered Red Mars */
        .planet-mars {
            width: 120px;
            height: 120px;
            top: 60%;
            right: 10%;
            background: radial-gradient(circle at 30% 30%, #f07b65 0%, #aa3a27 75%, #2a0b06 100%);
            box-shadow: -5px -5px 20px rgba(0,0,0,0.8) inset, 0 0 30px rgba(240, 123, 101, 0.15);
            opacity: 0.55;
        }

        /* Planet 3: Gaseous Blue Neptune */
        .planet-neptune {
            width: 250px;
            height: 250px;
            top: 85%;
            left: 12%;
            background: radial-gradient(circle at 30% 30%, #4facfe 0%, #002244 80%, #000b1a 100%);
            box-shadow: -15px -15px 40px rgba(0,0,0,0.9) inset, 0 0 60px rgba(79, 172, 254, 0.25);
            opacity: 0.6;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(5, 6, 8, 0.65);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
        }
        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: var(--accent);
        }

        /* --- WHITEPAPER HERO --- */
        .wp-hero {
            position: relative;
            padding: 180px 10% 60px 10%;
            text-align: center;
            z-index: 2;
        }
        .wp-hero h1 {
            font-family: var(--font-heading);
            font-size: 4rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }
        .wp-hero p {
            color: var(--accent);
            letter-spacing: 3px;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- CONTENT WRAPPER (Translucent Glassmorphism) --- */
        .content-wrapper {
            position: relative;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 2rem 100px 2rem;
            z-index: 2;
        }

        .markdown-body {
            background: rgba(11, 13, 18, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4rem;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.75;
        }

        .markdown-body h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--text-main);
            margin-top: 3.5rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .markdown-body h2 {
            font-family: var(--font-heading);
            font-size: 1.85rem;
            color: var(--text-main);
            margin-top: 3rem;
            margin-bottom: 1rem;
        }
        .markdown-body h3 {
            font-size: 1.35rem;
            color: var(--text-main);
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .markdown-body p {
            margin-bottom: 1.5rem;
        }
        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .markdown-body a:hover {
            border-color: var(--accent);
        }
        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.8rem;
            padding-left: 2rem;
        }
        .markdown-body li {
            margin-bottom: 0.6rem;
        }
        
        /* Table Styles (Highly readable dark glass) */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            overflow: hidden;
        }
        .markdown-body th, .markdown-body td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .markdown-body th {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            font-family: var(--font-heading);
            font-weight: bold;
        }

        /* Code Blocks */
        .markdown-body code {
            background: rgba(255,255,255,0.08);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
            color: #ff9f43;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: #08090d;
            padding: 1.5rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            color: #d1d5db;
        }

        /* --- ANIMATED TEXT REVEAL --- */
        .reveal-word {
            opacity: 0.15;
            transform: translateY(6px);
            display: inline-block;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-right: 0.22em;
            color: var(--text-main);
        }
        .reveal-word.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Fade in */
        .fade-in {
            animation: fadeIn 1s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="space-background">
        <div class="stars"></div>
        <!-- Planets moving at different parallax speeds -->
        <div class="planet planet-saturn" data-speed="0.12"></div>
        <div class="planet planet-mars" data-speed="-0.18"></div>
        <div class="planet planet-neptune" data-speed="0.08"></div>
    </div>

    <nav id="navbar">
        <a href="index.html" class="logo">Energivanu</a>
        <div class="nav-links">
            <a href="index.html">Equipment</a>
            <a href="whitepaper.html" style="color: var(--accent);">Whitepaper</a>
            <a href="magazine.html">Magazine</a>
            <a href="https://github.com/mysterious75/energivanu2">GitHub</a>
        </div>
    </nav>

    <header class="wp-hero fade-in">
        <h1>Technical Whitepaper</h1>
        <p>Documentation & Research</p>
    </header>

    <main class="content-wrapper fade-in">
        <div id="content" class="markdown-body">
            Loading documentation...
        </div>
    </main>

    <script>
        // Parallax scroll handler for background planets
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            document.querySelectorAll('.planet').forEach(planet => {
                const speed = parseFloat(planet.getAttribute('data-speed'));
                planet.style.transform = `translateY(${scrolled * speed}px)`;
            });
        });

        // Recursive text node splitter to wrap words in spans for reveal animation
        function revealTextNodes(element) {
            let wordIndex = 0;
            
            function helper(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    const text = node.nodeValue;
                    const words = text.split(/(\s+)/);
                    const fragment = document.createDocumentFragment();
                    
                    words.forEach(w => {
                        if (w.trim() === '') {
                            fragment.appendChild(document.createTextNode(w));
                        } else {
                            const span = document.createElement('span');
                            span.className = 'reveal-word';
                            span.textContent = w;
                            span.style.transitionDelay = `${wordIndex * 0.012}s`;
                            fragment.appendChild(span);
                            wordIndex++;
                        }
                    });
                    node.parentNode.replaceChild(fragment, node);
                } else {
                    const children = Array.from(node.childNodes);
                    children.forEach(child => {
                        if (child.nodeName !== 'PRE' && child.nodeName !== 'CODE' && child.nodeName !== 'A') {
                            helper(child);
                        }
                    });
                }
            }
            helper(element);
        }

        document.addEventListener("DOMContentLoaded", function() {
            fetch('WHITEPAPER.md')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(text => {
                    const contentDiv = document.getElementById('content');
                    contentDiv.innerHTML = marked.parse(text);
                    
                    // Select headers, paragraphs, and list items for reveal
                    const targets = contentDiv.querySelectorAll('h1, h2, h3, p, li');
                    targets.forEach(el => {
                        revealTextNodes(el);
                    });

                    // Set up intersection observer to trigger active class when scrolled into view
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const words = entry.target.querySelectorAll('.reveal-word');
                                words.forEach(word => word.classList.add('active'));
                                observer.unobserve(entry.target);
                            }
                        });
                    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                    targets.forEach(el => observer.observe(el));
                })
                .catch(error => {
                    document.getElementById('content').innerHTML = '<p>Error loading documentation. Please view directly on <a href="https://github.com/mysterious75/energivanu2">GitHub</a>.</p>';
                    console.error('Error fetching WHITEPAPER.md:', error);
                });
        });
    </script>
</body>
</html>
